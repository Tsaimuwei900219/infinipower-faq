<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InfiniPower Technical FAQ Assistant</title>
<style>
  :root {
    --primary: #0066cc;
    --primary-dark: #004fa3;
    --bg: #f0f4f8;
    --chat-bg: #ffffff;
    --user-bubble: #0066cc;
    --bot-bubble: #f0f4f8;
    --text: #1a1a2e;
    --subtext: #6b7280;
    --border: #d1d5db;
    --shadow: 0 4px 24px rgba(0,0,0,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', 'Hiragino Sans', 'Malgun Gothic', sans-serif;
    background: var(--bg);
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh;
  }
  header {
    width: 100%; background: linear-gradient(135deg, #0066cc 0%, #004fa3 100%);
    padding: 18px 24px; display: flex; align-items: center; gap: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .logo { width: 40px; height: 40px; background: white; border-radius: 10px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .logo svg { width: 26px; height: 26px; }
  header h1 { color: white; font-size: 1.15rem; font-weight: 700; line-height: 1.2; }
  header p { color: rgba(255,255,255,0.80); font-size: 0.78rem; margin-top: 2px; }

  .chat-wrapper {
    width: 100%; max-width: 780px; flex: 1;
    display: flex; flex-direction: column; padding: 16px 16px 0;
  }
  #chat-box {
    flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px;
    padding: 8px 0 16px; min-height: 0;
  }
  .msg { display: flex; gap: 8px; max-width: 88%; animation: fadeIn .25s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.bot { align-self: flex-start; }
  .avatar {
    width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 14px;
    margin-top: 2px;
  }
  .msg.bot .avatar { background: var(--primary); color: white; font-weight: 700; font-size: 11px; }
  .msg.user .avatar { background: #374151; color: white; font-size: 13px; }
  .bubble {
    padding: 11px 15px; border-radius: 16px; font-size: 0.88rem; line-height: 1.65;
    max-width: calc(100% - 44px); word-break: break-word;
  }
  .msg.user .bubble { background: var(--user-bubble); color: white; border-bottom-right-radius: 4px; }
  .msg.bot .bubble {
    background: var(--chat-bg); color: var(--text);
    border-bottom-left-radius: 4px; border: 1px solid var(--border);
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .bubble strong { font-weight: 600; }
  .bubble ul { margin: 6px 0 4px 18px; }
  .bubble li { margin-bottom: 3px; }
  .bubble .tag {
    display: inline-block; background: #e8f0fe; color: #1a56db;
    font-size: 0.75rem; padding: 1px 7px; border-radius: 10px; margin: 2px 2px 0 0;
    font-weight: 500;
  }
  .bubble .spec-table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 0.82rem; }
  .bubble .spec-table td { padding: 4px 8px; border: 1px solid #e5e7eb; }
  .bubble .spec-table tr:first-child td { background: #f3f4f6; font-weight: 600; }

  .suggestions {
    display: flex; flex-wrap: wrap; gap: 7px; padding: 8px 0 12px;
  }
  .sug-btn {
    background: white; border: 1px solid var(--border); color: var(--primary);
    padding: 6px 13px; border-radius: 20px; font-size: 0.80rem; cursor: pointer;
    transition: all .15s; font-family: inherit; font-weight: 500;
  }
  .sug-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }

  .input-area {
    background: white; border-top: 1px solid var(--border);
    padding: 12px 16px 14px; display: flex; gap: 10px;
    position: sticky; bottom: 0; width: 100%; max-width: 780px; align-self: center;
  }
  #user-input {
    flex: 1; border: 1.5px solid var(--border); border-radius: 22px;
    padding: 10px 16px; font-size: 0.88rem; outline: none;
    font-family: inherit; resize: none; transition: border .2s;
    min-height: 42px; max-height: 110px; overflow-y: auto;
  }
  #user-input:focus { border-color: var(--primary); }
  #send-btn {
    background: var(--primary); color: white; border: none;
    border-radius: 50%; width: 42px; height: 42px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s; flex-shrink: 0;
  }
  #send-btn:hover { background: var(--primary-dark); }
  #send-btn svg { width: 18px; height: 18px; }
  .typing { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
  .typing span { width: 7px; height: 7px; background: var(--subtext); border-radius: 50%; animation: bounce .9s infinite; }
  .typing span:nth-child(2) { animation-delay: .15s; }
  .typing span:nth-child(3) { animation-delay: .30s; }
  @keyframes bounce { 0%,80%,100% { transform: scale(0.7); opacity:.5; } 40% { transform: scale(1); opacity:1; } }
  .lang-flag { font-size: 0.75rem; opacity: 0.65; margin-top: 4px; text-align: right; }

  @media (max-width: 600px) {
    header h1 { font-size: 1rem; }
    .bubble { font-size: 0.85rem; }
    .sug-btn { font-size: 0.75rem; padding: 5px 10px; }
  }
</style>
</head>

function detectLang(text) {
  if (/[\u3040-\u309F\u30A0-\u30FF]/.test(text)) return 'ja';
  if (/[\uAC00-\uD7AF\u1100-\u11FF]/.test(text)) return 'ko';
  if (/[\u4E00-\u9FFF\u3400-\u4DBF]/.test(text)) return 'zh';
  return 'en';
}

// ─────────────────────────────────────────────
//  SEARCH KNOWLEDGE BASE
// ─────────────────────────────────────────────
function searchKB(query, lang) {
  const allEntries = [
    ...KB.company, ...KB.product, ...KB.specs,
    ...KB.applications, ...KB.modes, ...KB.waveform,
    ...KB.powervue, ...KB.training, ...KB.competitive,
    ...KB.troubleshoot, ...KB.installation, ...KB.license,
    ...KB.contact
  ];
  for (const entry of allEntries) {
    if (entry.keys.test(query)) {
      return entry[lang] || entry.en;
    }
  }
  return null;
}

// ─────────────────────────────────────────────
//  UI LOGIC
// ─────────────────────────────────────────────
let currentLang = 'en';

function renderSuggestions(lang) {
  const container = document.getElementById('suggestions');
  container.innerHTML = '';
  (SUGGESTIONS[lang] || SUGGESTIONS.en).forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'sug-btn';
    btn.textContent = s;
    btn.onclick = () => sendMessage(s);
    container.appendChild(btn);
  });
}

function addMessage(html, role, lang) {
  const box = document.getElementById('chat-box');
  const msg = document.createElement('div');
  msg.className = `msg ${role}`;
  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'bot' ? 'IP' : '👤';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = html;
  msg.appendChild(avatar);
  msg.appendChild(bubble);
  box.appendChild(msg);
  box.scrollTop = box.scrollHeight;
}

function showTyping() {
  const box = document.getElementById('chat-box');
  const msg = document.createElement('div');
  msg.className = 'msg bot';
  msg.id = 'typing-indicator';
  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = 'IP';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  msg.appendChild(avatar);
  msg.appendChild(bubble);
  box.appendChild(msg);
  box.scrollTop = box.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

async function sendMessage(text) {
  if (!text.trim()) return;
  const input = document.getElementById('user-input');
  input.value = '';
  input.style.height = 'auto';

  addMessage(text, 'user');
  showTyping();

  await new Promise(r => setTimeout(r, 480));
  removeTyping();

  const lang = detectLang(text);
  currentLang = lang;
  const answer = searchKB(text, lang) || FALLBACK[lang] || FALLBACK.en;
  addMessage(answer, 'bot', lang);
  renderSuggestions(lang);
}

// Init
window.addEventListener('DOMContentLoaded', () => {
  addMessage(WELCOME.en, 'bot', 'en');
  renderSuggestions('en');

  const input = document.getElementById('user-input');
  const btn = document.getElementById('send-btn');

  btn.addEventListener('click', () => sendMessage(input.value));
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage(input.value);
    }
  });
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 110) + 'px';
  });
});
